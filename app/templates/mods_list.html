<div class="grid gap-4">
    {% for mod in mods %}
    <div class="bg-gray-800 rounded-lg p-4 border border-gray-700">
        <div class="flex justify-between items-start">
            <div>
                <h3 class="text-lg font-semibold">{{ mod.name }}</h3>
                {% if mod.author %}
                <p class="text-sm text-gray-400">by {{ mod.author }}</p>
                {% endif %}
                {% if mod.version %}
                <p class="text-sm text-gray-500">v{{ mod.version }}</p>
                {% endif %}
            </div>
            <div class="flex items-center space-x-2">
                {% if mod.is_enabled %}
                <span class="px-2 py-1 bg-green-600 rounded text-xs">Enabled</span>
                <button 
                    hx-post="/api/mods/{{ mod.id }}/disable"
                    hx-target="closest div"
                    hx-swap="outerHTML"
                    class="px-3 py-1 bg-yellow-600 hover:bg-yellow-700 rounded text-sm">
                    Disable
                </button>
                {% else %}
                <span class="px-2 py-1 bg-gray-600 rounded text-xs">Disabled</span>
                <button 
                    hx-post="/api/mods/{{ mod.id }}/enable"
                    hx-target="closest div"
                    hx-swap="outerHTML"
                    class="px-3 py-1 bg-green-600 hover:bg-green-700 rounded text-sm">
                    Enable
                </button>
                {% endif %}
                <button 
                    hx-delete="/api/mods/{{ mod.id }}"
                    hx-confirm="Are you sure you want to uninstall this mod?"
                    hx-target="closest div"
                    hx-swap="outerHTML"
                    class="px-3 py-1 bg-red-600 hover:bg-red-700 rounded text-sm">
                    Uninstall
                </button>
            </div>
        </div>
    </div>
    {% else %}
    <div class="text-center py-8 text-gray-400">
        No mods installed. Upload a mod file to get started.
    </div>
    {% endfor %}
</div>
