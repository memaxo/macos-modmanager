{% extends "base.html" %}

{% block content %}
<div class="mb-6 flex justify-between items-center">
    <h2 class="text-2xl font-bold">Installed Mods</h2>
    <button 
        hx-get="/api/mods" 
        hx-target="#mod-list" 
        hx-swap="innerHTML"
        class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded">
        Refresh
    </button>
</div>

<div id="mod-list" hx-get="/api/mods" hx-trigger="load">
    <div class="text-center py-8">Loading mods...</div>
</div>

<div class="mt-8">
    <h3 class="text-xl font-bold mb-4">Install Mod</h3>
    <form 
        hx-post="/api/mods" 
        hx-encoding="multipart/form-data"
        hx-target="#mod-list"
        hx-swap="outerHTML"
        class="space-y-4">
        <div>
            <label class="block text-sm font-medium mb-2">Mod File</label>
            <input 
                type="file" 
                name="mod_file" 
                accept=".zip,.7z,.rar"
                class="block w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700">
        </div>
        <div>
            <label class="block text-sm font-medium mb-2">Nexus Mod ID (optional)</label>
            <input 
                type="number" 
                name="nexus_mod_id" 
                class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded">
        </div>
        <button 
            type="submit" 
            class="px-4 py-2 bg-green-600 hover:bg-green-700 rounded">
            Install Mod
        </button>
    </form>
</div>
{% endblock %}
