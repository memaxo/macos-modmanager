{% extends "base.html" %}

{% block content %}
<div style="margin-bottom: var(--space-6);">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-4);">
        <h1 style="font-size: var(--text-3xl); font-weight: var(--font-bold); color: var(--text-primary);">
            Mods
        </h1>
        <a href="/mods/install" class="btn btn-primary">
            Install Mod
        </a>
    </div>
    
    <!-- Search and Filters -->
    <div style="display: flex; gap: var(--space-4); margin-bottom: var(--space-6); flex-wrap: wrap;">
        <div style="flex: 1; min-width: 200px;">
            <input 
                type="text" 
                id="search-input"
                placeholder="Search mods..." 
                class="input"
                hx-get="/api/mods"
                hx-trigger="keyup changed delay:300ms, search"
                hx-target="#mod-list"
                hx-include="#filters"
                name="search">
        </div>
        <select 
            id="sort-select"
            class="input"
            style="width: auto;"
            hx-get="/api/mods"
            hx-trigger="change"
            hx-target="#mod-list"
            hx-include="#filters, #search-input"
            name="sort_by">
            <option value="name">Sort by Name</option>
            <option value="date">Sort by Date</option>
            <option value="size">Sort by Size</option>
            <option value="author">Sort by Author</option>
        </select>
        <div style="display: flex; gap: var(--space-2);">
            <button 
                id="view-grid"
                class="btn btn-secondary"
                onclick="setView('grid')"
                style="padding: var(--space-2);">
                ⊞ Grid
            </button>
            <button 
                id="view-list"
                class="btn btn-secondary"
                onclick="setView('list')"
                style="padding: var(--space-2);">
                ☰ List
            </button>
        </div>
    </div>
    
    <!-- Filters Sidebar and Mod List -->
    <div style="display: flex; gap: var(--space-6);">
        <!-- Filter Sidebar -->
        <aside id="filter-sidebar" style="width: 16rem; flex-shrink: 0;">
            {% include "components/filter_sidebar.html" %}
        </aside>
        
        <!-- Mod List -->
        <div style="flex: 1;">
            <div id="filters" style="display: none;">
                <input type="hidden" name="type" id="filter-type" value="">
                <input type="hidden" name="status" id="filter-status" value="">
                <input type="hidden" name="compatibility" id="filter-compatibility" value="">
            </div>
            
            <!-- Bulk Actions Toolbar -->
            <div id="bulk-actions" style="display: none; margin-bottom: var(--space-4); padding: var(--space-3); background: var(--bg-secondary); border: 1px solid var(--border-primary); border-radius: var(--radius-lg);">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span style="color: var(--text-secondary);" id="selected-count">0 mods selected</span>
                    <div style="display: flex; gap: var(--space-2);">
                        <button class="btn btn-secondary" onclick="bulkAction('enable')">Enable</button>
                        <button class="btn btn-secondary" onclick="bulkAction('disable')">Disable</button>
                        <button class="btn btn-danger" onclick="bulkAction('delete')">Delete</button>
                    </div>
                </div>
            </div>
            
            <div id="mod-list" 
                 hx-get="/api/mods" 
                 hx-trigger="load"
                 hx-target="this"
                 hx-swap="innerHTML"
                 data-view="grid">
                <div style="text-align: center; padding: var(--space-8); color: var(--text-secondary);">
                    Loading mods...
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/static/js/mod_browser.js"></script>
{% endblock %}
