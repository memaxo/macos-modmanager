<div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: var(--space-4);">
    {% for mod in wishlist %}
    <div class="card" style="display: flex; flex-direction: column; overflow: hidden; height: 100%;">
        <div style="aspect-ratio: 16/9; overflow: hidden; background: var(--bg-tertiary);">
            <img src="{{ mod.thumbnail_url }}" alt="{{ mod.name }}" style="width: 100%; height: 100%; object-fit: cover;">
        </div>
        <div style="padding: var(--space-3); flex-grow: 1; display: flex; flex-direction: column;">
            <h4 style="font-size: var(--text-sm); font-weight: var(--font-semibold); margin-bottom: 0;">{{ mod.name }}</h4>
            <p style="font-size: var(--text-xs); color: var(--text-secondary); margin-bottom: var(--space-3);">by {{ mod.author }}</p>
            <div style="margin-top: auto; display: flex; gap: var(--space-2);">
                <button class="btn btn-primary" 
                        style="padding: var(--space-1) var(--space-2); font-size: var(--text-xs); flex-grow: 1;"
                        hx-post="/api/mods/nexus/{{ mod.nexus_mod_id }}"
                        hx-swap="none">
                    Install
                </button>
                <button class="btn btn-secondary" 
                        style="padding: var(--space-1) var(--space-2); font-size: var(--text-xs);"
                        hx-post="/api/mods/discovery/wishlist/{{ mod.nexus_mod_id }}?name={{ mod.name }}"
                        hx-target="closest .card"
                        hx-swap="delete">
                    &times;
                </button>
            </div>
        </div>
    </div>
    {% else %}
    <div style="grid-column: 1 / -1; text-align: center; padding: var(--space-8); color: var(--text-secondary); font-size: var(--text-sm);">
        Your wishlist is empty.
    </div>
    {% endfor %}
</div>
