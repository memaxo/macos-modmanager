{% extends "base.html" %}

{% block content %}
<div style="max-width: 700px; margin: 0 auto;">
    <!-- Header -->
    <div style="text-align: center; margin-bottom: var(--space-8);">
        <div style="width: 80px; height: 80px; margin: 0 auto var(--space-4); background: linear-gradient(135deg, var(--accent-primary), var(--accent-hover)); border-radius: var(--radius-xl); display: flex; align-items: center; justify-content: center;">
            <i data-lucide="rocket" style="width: 40px; height: 40px; color: var(--bg-primary);"></i>
        </div>
        <h1 style="font-size: var(--text-3xl); font-weight: var(--font-bold); color: var(--text-primary); margin-bottom: var(--space-2);">
            Setup Wizard
        </h1>
        <p style="color: var(--text-secondary);">Set up Cyberpunk 2077 modding on your Mac in minutes</p>
    </div>
    
    <!-- Progress Steps -->
    <div id="progress-steps" style="display: flex; justify-content: space-between; margin-bottom: var(--space-8); padding: 0 var(--space-4);">
        <div class="step-indicator" data-step="1">
            <div class="step-circle active">1</div>
            <div class="step-label">Detect</div>
        </div>
        <div class="step-connector"></div>
        <div class="step-indicator" data-step="2">
            <div class="step-circle">2</div>
            <div class="step-label">Select</div>
        </div>
        <div class="step-connector"></div>
        <div class="step-indicator" data-step="3">
            <div class="step-circle">3</div>
            <div class="step-label">Install</div>
        </div>
        <div class="step-connector"></div>
        <div class="step-indicator" data-step="4">
            <div class="step-circle">4</div>
            <div class="step-label">Complete</div>
        </div>
    </div>
    
    <!-- Wizard Content -->
    <div id="wizard-content" class="card" style="padding: var(--space-8);">
        <!-- Step 1: Detection (loaded by default) -->
        <div id="step-1" class="wizard-step">
            <div style="text-align: center; margin-bottom: var(--space-6);">
                <i data-lucide="search" style="width: 48px; height: 48px; color: var(--accent-primary); margin-bottom: var(--space-4);"></i>
                <h2 style="font-size: var(--text-xl); font-weight: var(--font-semibold); color: var(--text-primary); margin-bottom: var(--space-2);">
                    Detecting Your Environment
                </h2>
                <p style="color: var(--text-secondary);">Scanning for Cyberpunk 2077 installation...</p>
            </div>
            
            <div id="detection-results" 
                 hx-get="/api/setup/detect" 
                 hx-trigger="load"
                 hx-swap="innerHTML">
                <div style="text-align: center; padding: var(--space-8);">
                    <div class="spinner"></div>
                    <p style="color: var(--text-tertiary); margin-top: var(--space-4);">Detecting game installation...</p>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .step-indicator {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: var(--space-2);
    }
    
    .step-circle {
        width: 36px;
        height: 36px;
        border-radius: var(--radius-full);
        background: var(--bg-tertiary);
        border: 2px solid var(--border-primary);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: var(--font-semibold);
        color: var(--text-tertiary);
        transition: all var(--transition-base);
    }
    
    .step-circle.active {
        background: var(--accent-primary);
        border-color: var(--accent-primary);
        color: var(--bg-primary);
    }
    
    .step-circle.completed {
        background: var(--accent-success);
        border-color: var(--accent-success);
        color: var(--bg-primary);
    }
    
    .step-label {
        font-size: var(--text-xs);
        color: var(--text-tertiary);
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }
    
    .step-connector {
        flex: 1;
        height: 2px;
        background: var(--border-primary);
        margin-top: 18px;
    }
    
    .step-connector.active {
        background: var(--accent-primary);
    }
    
    .wizard-step {
        animation: fadeIn var(--transition-base);
    }
    
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    
    .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid var(--border-primary);
        border-top-color: var(--accent-primary);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto;
    }
    
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    
    .check-item {
        display: flex;
        align-items: center;
        gap: var(--space-3);
        padding: var(--space-3);
        background: var(--bg-tertiary);
        border-radius: var(--radius-md);
        margin-bottom: var(--space-2);
    }
    
    .check-item.success {
        border-left: 3px solid var(--accent-success);
    }
    
    .check-item.error {
        border-left: 3px solid var(--accent-error);
    }
    
    .check-item.warning {
        border-left: 3px solid var(--accent-warning);
    }
    
    .framework-option {
        display: flex;
        align-items: flex-start;
        gap: var(--space-4);
        padding: var(--space-4);
        background: var(--bg-tertiary);
        border: 1px solid var(--border-primary);
        border-radius: var(--radius-md);
        margin-bottom: var(--space-3);
        cursor: pointer;
        transition: all var(--transition-base);
    }
    
    .framework-option:hover {
        border-color: var(--accent-primary);
        background: var(--bg-hover);
    }
    
    .framework-option input[type="checkbox"] {
        width: 20px;
        height: 20px;
        margin-top: 2px;
    }
    
    .progress-bar {
        height: 8px;
        background: var(--bg-tertiary);
        border-radius: var(--radius-full);
        overflow: hidden;
        margin-bottom: var(--space-4);
    }
    
    .progress-bar-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--accent-primary), var(--accent-hover));
        border-radius: var(--radius-full);
        transition: width 0.3s ease;
    }
    
    .install-log {
        background: var(--bg-primary);
        border: 1px solid var(--border-primary);
        border-radius: var(--radius-md);
        padding: var(--space-4);
        max-height: 200px;
        overflow-y: auto;
        font-family: monospace;
        font-size: var(--text-sm);
    }
    
    .install-log-entry {
        padding: var(--space-1) 0;
        color: var(--text-secondary);
    }
    
    .install-log-entry.success {
        color: var(--accent-success);
    }
    
    .install-log-entry.error {
        color: var(--accent-error);
    }
</style>

<script>
    // Update progress steps
    function updateProgressSteps(currentStep) {
        const steps = document.querySelectorAll('.step-indicator');
        const connectors = document.querySelectorAll('.step-connector');
        
        steps.forEach((step, index) => {
            const circle = step.querySelector('.step-circle');
            const stepNum = index + 1;
            
            if (stepNum < currentStep) {
                circle.classList.remove('active');
                circle.classList.add('completed');
                circle.innerHTML = '<i data-lucide="check" style="width: 16px; height: 16px;"></i>';
            } else if (stepNum === currentStep) {
                circle.classList.add('active');
                circle.classList.remove('completed');
                circle.textContent = stepNum;
            } else {
                circle.classList.remove('active', 'completed');
                circle.textContent = stepNum;
            }
        });
        
        connectors.forEach((connector, index) => {
            if (index < currentStep - 1) {
                connector.classList.add('active');
            } else {
                connector.classList.remove('active');
            }
        });
        
        lucide.createIcons();
    }
    
    // Handle HTMX events
    document.body.addEventListener('htmx:afterSwap', function(evt) {
        lucide.createIcons();
        
        // Check for step update attribute
        const stepAttr = evt.detail.target.getAttribute('data-current-step');
        if (stepAttr) {
            updateProgressSteps(parseInt(stepAttr));
        }
    });
    
    // Initialize
    document.addEventListener('DOMContentLoaded', function() {
        lucide.createIcons();
    });
</script>
{% endblock %}
