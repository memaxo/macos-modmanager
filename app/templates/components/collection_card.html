<div class="card" style="padding: var(--space-4);">
    {% if collection.thumbnail_url %}
    <div style="width: 100%; aspect-ratio: 16/9; background: var(--bg-tertiary); border-radius: var(--radius-md); margin-bottom: var(--space-3); overflow: hidden;">
        <img src="{{ collection.thumbnail_url }}" alt="{{ collection.name }}" style="width: 100%; height: 100%; object-fit: cover;">
    </div>
    {% else %}
    <div style="width: 100%; aspect-ratio: 16/9; background: var(--bg-tertiary); border-radius: var(--radius-md); margin-bottom: var(--space-3); display: flex; align-items: center; justify-content: center; color: var(--text-tertiary); font-size: var(--text-4xl);">
        📚
    </div>
    {% endif %}
    
    <h3 style="font-size: var(--text-lg); font-weight: var(--font-semibold); color: var(--text-primary); margin-bottom: var(--space-1);">
        {{ collection.name }}
    </h3>
    
    {% if collection.author %}
    <p style="font-size: var(--text-sm); color: var(--text-secondary); margin-bottom: var(--space-2);">
        by {{ collection.author }}
    </p>
    {% endif %}
    
    <div style="display: flex; gap: var(--space-2); margin-bottom: var(--space-3); flex-wrap: wrap;">
        <span class="badge badge-info">{{ collection.mod_count }} mods</span>
        {% if collection.version %}
        <span class="badge badge-success">v{{ collection.version }}</span>
        {% endif %}
    </div>
    
    <div style="display: flex; gap: var(--space-2);">
        <a href="/collections/{{ collection.id }}" class="btn btn-secondary" style="flex: 1;">
            Preview
        </a>
        <button 
            class="btn btn-primary"
            hx-post="/api/collections/{{ collection.id }}/install"
            hx-target="#notification-area"
            hx-swap="beforeend">
            Install
        </button>
    </div>
</div>
