<div class="card" style="padding: var(--space-4); margin-bottom: var(--space-3);">
    <div style="display: flex; align-items: start; gap: var(--space-3);">
        <div style="display: flex; align-items: center; justify-content: center; color: {% if type == 'install' %}var(--accent-success){% elif type == 'uninstall' %}var(--accent-error){% elif type == 'update' %}var(--accent-info){% elif type == 'conflict' %}var(--accent-warning){% elif type == 'error' %}var(--accent-error){% else %}var(--accent-info){% endif %};">
            {% if type == 'install' %}<i data-lucide="check-circle" style="width: 1.2rem; height: 1.2rem;"></i>
            {% elif type == 'uninstall' %}<i data-lucide="minus-circle" style="width: 1.2rem; height: 1.2rem;"></i>
            {% elif type == 'update' %}<i data-lucide="refresh-cw" style="width: 1.2rem; height: 1.2rem;"></i>
            {% elif type == 'conflict' %}<i data-lucide="alert-triangle" style="width: 1.2rem; height: 1.2rem;"></i>
            {% elif type == 'error' %}<i data-lucide="x-circle" style="width: 1.2rem; height: 1.2rem;"></i>
            {% else %}<i data-lucide="info" style="width: 1.2rem; height: 1.2rem;"></i>
            {% endif %}
        </div>
        <div style="flex: 1;">
            <div style="color: var(--text-primary); margin-bottom: var(--space-1);">
                {{ message }}
            </div>
            <div style="font-size: var(--text-xs); color: var(--text-tertiary);">
                {{ timestamp }}
            </div>
        </div>
        {% if undo_action is defined and undo_action %}
        <button 
            class="btn-ghost" 
            style="font-size: var(--text-xs); padding: var(--space-1) var(--space-2);"
            hx-post="{{ undo_action }}"
            hx-target="#notification-area"
            hx-swap="beforeend">
            Undo
        </button>
        {% endif %}
    </div>
</div>
