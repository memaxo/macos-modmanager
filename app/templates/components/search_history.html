<div style="display: flex; flex-wrap: wrap; gap: var(--space-2);">
    {% for item in history %}
    <button class="badge" 
            onclick="document.getElementById('nexus-search').value = '{{ item }}'; 
                     document.getElementById('nexus-search').dispatchEvent(new Event('keyup'));"
            style="background: var(--bg-tertiary); border: 1px solid var(--border-primary); color: var(--text-secondary); cursor: pointer; padding: var(--space-1) var(--space-2); border-radius: var(--radius-sm); font-size: 10px;">
        {{ item }}
    </button>
    {% endfor %}
</div>
