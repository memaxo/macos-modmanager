<div class="card">
    <h3 style="font-size: var(--text-lg); font-weight: var(--font-semibold); color: var(--text-primary); margin-bottom: var(--space-4);">
        Files ({{ files|length }})
    </h3>
    
    {% if files %}
    <div style="display: flex; flex-direction: column; gap: var(--space-2);">
        {% for file in files %}
        <div style="display: flex; justify-content: space-between; align-items: center; padding: var(--space-2); background: var(--bg-tertiary); border-radius: var(--radius-md);">
            <div style="flex: 1; min-width: 0;">
                <div style="color: var(--text-primary); font-family: monospace; font-size: var(--text-sm); word-break: break-all;">
                    {{ file.file_path }}
                </div>
                {% if file.file_size %}
                <div style="font-size: var(--text-xs); color: var(--text-tertiary); margin-top: var(--space-1);">
                    {{ "%.2f"|format(file.file_size / 1024) }} KB
                </div>
                {% endif %}
            </div>
        </div>
        {% endfor %}
    </div>
    {% else %}
    <div style="text-align: center; padding: var(--space-8); color: var(--text-secondary);">
        No files found
    </div>
    {% endif %}
</div>
