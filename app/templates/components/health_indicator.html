<div style="display: flex; align-items: center; gap: var(--space-2); padding: var(--space-2) var(--space-3); background: var(--bg-secondary); border: 1px solid var(--border-primary); border-radius: var(--radius-md);">
    <div style="display: flex; align-items: center; justify-content: center; color: {% if status == 'ok' %}var(--accent-success){% elif status == 'warning' %}var(--accent-warning){% elif status == 'error' %}var(--accent-error){% else %}var(--accent-info){% endif %};">
        {% if status == 'ok' %}<i data-lucide="check-circle" style="width: 1.1rem; height: 1.1rem;"></i>
        {% elif status == 'warning' %}<i data-lucide="alert-circle" style="width: 1.1rem; height: 1.1rem;"></i>
        {% elif status == 'error' %}<i data-lucide="x-circle" style="width: 1.1rem; height: 1.1rem;"></i>
        {% else %}<i data-lucide="info" style="width: 1.1rem; height: 1.1rem;"></i>
        {% endif %}
    </div>
    <div>
        <div style="color: var(--text-primary); font-size: var(--text-sm);">
            {{ label }}
        </div>
        {% if description %}
        <div style="color: var(--text-secondary); font-size: var(--text-xs);">
            {{ description }}
        </div>
        {% endif %}
    </div>
</div>
