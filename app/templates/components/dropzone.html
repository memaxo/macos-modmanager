<div class="card" id="dropzone" style="border: 2px dashed var(--border-primary); padding: var(--space-8); text-align: center; transition: all var(--transition-base); cursor: pointer;">
    <div style="font-size: var(--text-4xl); margin-bottom: var(--space-4);">📦</div>
    <h3 style="font-size: var(--text-xl); font-weight: var(--font-semibold); color: var(--text-primary); margin-bottom: var(--space-2);">
        Drag and drop mod file here
    </h3>
    <p style="color: var(--text-secondary); margin-bottom: var(--space-4);">
        or click to browse
    </p>
    <p style="font-size: var(--text-sm); color: var(--text-tertiary);">
        Supports: .zip, .7z, .rar
    </p>
    <input 
        type="file" 
        id="file-input"
        accept=".zip,.7z,.rar"
        style="display: none;"
        onchange="handleFileSelect(event)">
</div>

<div id="upload-progress" style="display: none; margin-top: var(--space-4);">
    <div class="card">
        <div style="display: flex; align-items: center; gap: var(--space-3);">
            <div style="flex: 1;">
                <div style="color: var(--text-primary); margin-bottom: var(--space-1);" id="upload-filename">
                    Uploading...
                </div>
                <div class="progress-bar">
                    <div id="progress-fill" style="width: 0%; height: 100%; background: var(--accent-primary); border-radius: var(--radius-full); transition: width 0.3s ease;"></div>
                </div>
            </div>
            <div style="color: var(--text-secondary); font-size: var(--text-sm);" id="upload-percent">
                0%
            </div>
        </div>
    </div>
</div>

<style>
.progress-bar {
    width: 100%;
    height: 0.5rem;
    background: var(--bg-tertiary);
    border-radius: var(--radius-full);
    overflow: hidden;
}

#dropzone.dragover {
    border-color: var(--accent-primary);
    background: var(--bg-tertiary);
}
</style>

<script>
// Wait for DOM to be ready
document.addEventListener('DOMContentLoaded', function() {
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('file-input');
    
    if (!dropzone || !fileInput) {
        console.error('Dropzone elements not found');
        return;
    }
    
    dropzone.addEventListener('click', () => {
        fileInput.click();
    });

    dropzone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropzone.classList.add('dragover');
    });

    dropzone.addEventListener('dragleave', () => {
        dropzone.classList.remove('dragover');
    });

    dropzone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropzone.classList.remove('dragover');
        
        const files = e.dataTransfer.files;
        if (files.length > 0) {
            handleFile(files[0]);
        }
    });
});

function handleFileSelect(event) {
    const file = event.target.files[0];
    if (file) {
        handleFile(file);
    }
}

function handleFile(file) {
    if (!file) {
        showNotification('No file selected', 'error');
        return;
    }
    
    // Validate file type
    const validTypes = ['.zip', '.7z', '.rar'];
    const fileExt = '.' + file.name.split('.').pop().toLowerCase();
    
    if (!validTypes.includes(fileExt)) {
        showNotification('Invalid file type. Please upload a .zip, .7z, or .rar file.', 'error');
        return;
    }
    
    // Show progress
    const progressEl = document.getElementById('upload-progress');
    const filenameEl = document.getElementById('upload-filename');
    
    if (progressEl && filenameEl) {
        filenameEl.textContent = file.name;
        progressEl.style.display = 'block';
    }
    
    // Upload file
    uploadFile(file);
}

function uploadFile(file) {
    const formData = new FormData();
    formData.append('mod_file', file);
    
    const checkCompatibility = document.querySelector('input[name="check_compatibility"]');
    if (checkCompatibility) {
        formData.append('check_compatibility', checkCompatibility.checked);
    } else {
        formData.append('check_compatibility', 'true');
    }
    
    // Note: create_backup is not currently supported by the API endpoint
    // but we can include it for future compatibility
    const createBackup = document.querySelector('input[name="create_backup"]');
    if (createBackup) {
        formData.append('create_backup', createBackup.checked);
    }
    
    const xhr = new XMLHttpRequest();
    
    xhr.upload.addEventListener('progress', (e) => {
        if (e.lengthComputable) {
            const percent = (e.loaded / e.total) * 100;
            document.getElementById('progress-fill').style.width = percent + '%';
            document.getElementById('upload-percent').textContent = Math.round(percent) + '%';
        }
    });
    
    xhr.addEventListener('load', () => {
        document.getElementById('upload-progress').style.display = 'none';
        
        if (xhr.status === 200) {
            try {
                const response = JSON.parse(xhr.responseText);
                showNotification('Mod installed successfully!', 'success');
                setTimeout(() => {
                    window.location.href = '/mods';
                }, 1500);
            } catch (e) {
                // If response is not JSON, assume success
                showNotification('Mod installed successfully!', 'success');
                setTimeout(() => {
                    window.location.href = '/mods';
                }, 1500);
            }
        } else {
            let errorMessage = 'Installation failed';
            try {
                const errorResponse = JSON.parse(xhr.responseText);
                if (errorResponse.detail) {
                    if (typeof errorResponse.detail === 'string') {
                        errorMessage = errorResponse.detail;
                    } else if (errorResponse.detail.error) {
                        errorMessage = errorResponse.detail.error;
                    }
                }
            } catch (e) {
                errorMessage = xhr.responseText || `HTTP ${xhr.status}: ${xhr.statusText}`;
            }
            showNotification(errorMessage, 'error');
            // Reset file input
            document.getElementById('file-input').value = '';
        }
    });
    
    xhr.addEventListener('error', () => {
        document.getElementById('upload-progress').style.display = 'none';
        showNotification('Upload failed - network error', 'error');
        document.getElementById('file-input').value = '';
    });
    
    xhr.addEventListener('abort', () => {
        document.getElementById('upload-progress').style.display = 'none';
        showNotification('Upload cancelled', 'error');
        document.getElementById('file-input').value = '';
    });
    
    xhr.open('POST', '/api/mods/');
    xhr.send(formData);
}

function showNotification(message, type) {
    const notificationArea = document.getElementById('notification-area');
    if (!notificationArea) {
        console.error('Notification area not found');
        // Fallback to alert if notification area doesn't exist
        alert(message);
        return;
    }
    
    const notification = document.createElement('div');
    notification.className = `toast toast-${type}`;
    
    // Set background color based on type
    const bgColor = type === 'success' ? 'var(--success-bg)' : 
                   type === 'error' ? 'var(--danger-bg)' : 
                   'var(--bg-secondary)';
    const borderColor = type === 'success' ? 'var(--success-border)' : 
                       type === 'error' ? 'var(--danger-border)' : 
                       'var(--border-primary)';
    const textColor = type === 'success' ? 'var(--success-text)' : 
                     type === 'error' ? 'var(--danger-text)' : 
                     'var(--text-primary)';
    
    notification.style.cssText = `
        background: ${bgColor};
        border: 1px solid ${borderColor};
        border-radius: var(--radius-lg);
        padding: var(--space-3);
        margin-bottom: var(--space-2);
        box-shadow: var(--shadow-lg);
        color: ${textColor};
        animation: slideUp 0.3s ease;
        display: flex;
        align-items: center;
        gap: var(--space-2);
    `;
    
    // Add icon
    const icon = type === 'success' ? 'check-circle' : 
                type === 'error' ? 'x-circle' : 
                'info';
    notification.innerHTML = `
        <i data-lucide="${icon}" style="width: 1rem; height: 1rem;"></i>
        <span>${message}</span>
    `;
    
    notificationArea.appendChild(notification);
    
    // Initialize Lucide icons
    if (typeof lucide !== 'undefined') {
        lucide.createIcons();
    }
    
    setTimeout(() => {
        notification.style.opacity = '0';
        notification.style.transition = 'opacity 0.3s ease';
        setTimeout(() => notification.remove(), 300);
    }, 5000);
}
</script>
