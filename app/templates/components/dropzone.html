<div class="card" id="dropzone" style="border: 2px dashed var(--border-primary); padding: var(--space-8); text-align: center; transition: all var(--transition-base); cursor: pointer;">
    <div style="font-size: var(--text-4xl); margin-bottom: var(--space-4);">📦</div>
    <h3 style="font-size: var(--text-xl); font-weight: var(--font-semibold); color: var(--text-primary); margin-bottom: var(--space-2);">
        Drag and drop mod file here
    </h3>
    <p style="color: var(--text-secondary); margin-bottom: var(--space-4);">
        or click to browse
    </p>
    <p style="font-size: var(--text-sm); color: var(--text-tertiary);">
        Supports: .zip, .7z, .rar
    </p>
    <input 
        type="file" 
        id="file-input"
        accept=".zip,.7z,.rar"
        style="display: none;"
        onchange="handleFileSelect(event)">
</div>

<div id="upload-progress" style="display: none; margin-top: var(--space-4);">
    <div class="card">
        <div style="display: flex; align-items: center; gap: var(--space-3);">
            <div style="flex: 1;">
                <div style="color: var(--text-primary); margin-bottom: var(--space-1);" id="upload-filename">
                    Uploading...
                </div>
                <div class="progress-bar">
                    <div id="progress-fill" style="width: 0%; height: 100%; background: var(--accent-primary); border-radius: var(--radius-full); transition: width 0.3s ease;"></div>
                </div>
            </div>
            <div style="color: var(--text-secondary); font-size: var(--text-sm);" id="upload-percent">
                0%
            </div>
        </div>
    </div>
</div>

<style>
.progress-bar {
    width: 100%;
    height: 0.5rem;
    background: var(--bg-tertiary);
    border-radius: var(--radius-full);
    overflow: hidden;
}

#dropzone.dragover {
    border-color: var(--accent-primary);
    background: var(--bg-tertiary);
}
</style>

<script>
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('file-input');

dropzone.addEventListener('click', () => fileInput.click());

dropzone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropzone.classList.add('dragover');
});

dropzone.addEventListener('dragleave', () => {
    dropzone.classList.remove('dragover');
});

dropzone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropzone.classList.remove('dragover');
    
    const files = e.dataTransfer.files;
    if (files.length > 0) {
        handleFile(files[0]);
    }
});

function handleFileSelect(event) {
    const file = event.target.files[0];
    if (file) {
        handleFile(file);
    }
}

function handleFile(file) {
    // Validate file type
    const validTypes = ['.zip', '.7z', '.rar'];
    const fileExt = '.' + file.name.split('.').pop().toLowerCase();
    
    if (!validTypes.includes(fileExt)) {
        alert('Invalid file type. Please upload a .zip, .7z, or .rar file.');
        return;
    }
    
    // Show progress
    document.getElementById('upload-filename').textContent = file.name;
    document.getElementById('upload-progress').style.display = 'block';
    
    // Upload file
    uploadFile(file);
}

function uploadFile(file) {
    const formData = new FormData();
    formData.append('mod_file', file);
    formData.append('check_compatibility', document.querySelector('input[name="check_compatibility"]').checked);
    formData.append('create_backup', document.querySelector('input[name="create_backup"]').checked);
    
    const xhr = new XMLHttpRequest();
    
    xhr.upload.addEventListener('progress', (e) => {
        if (e.lengthComputable) {
            const percent = (e.loaded / e.total) * 100;
            document.getElementById('progress-fill').style.width = percent + '%';
            document.getElementById('upload-percent').textContent = Math.round(percent) + '%';
        }
    });
    
    xhr.addEventListener('load', () => {
        if (xhr.status === 200) {
            document.getElementById('upload-progress').style.display = 'none';
            showNotification('Mod installed successfully!', 'success');
            setTimeout(() => {
                window.location.href = '/mods';
            }, 1500);
        } else {
            showNotification('Installation failed: ' + xhr.responseText, 'error');
        }
    });
    
    xhr.addEventListener('error', () => {
        showNotification('Upload failed', 'error');
    });
    
    xhr.open('POST', '/api/mods/');
    xhr.send(formData);
}

function showNotification(message, type) {
    const notificationArea = document.getElementById('notification-area');
    if (!notificationArea) return;
    
    const notification = document.createElement('div');
    notification.className = `toast toast-${type}`;
    notification.textContent = message;
    notification.style.cssText = `
        background: var(--bg-secondary);
        border: 1px solid var(--border-primary);
        border-radius: var(--radius-lg);
        padding: var(--space-3);
        margin-bottom: var(--space-2);
        box-shadow: var(--shadow-lg);
        animation: slideUp 0.3s ease;
    `;
    
    notificationArea.appendChild(notification);
    
    setTimeout(() => {
        notification.style.opacity = '0';
        setTimeout(() => notification.remove(), 300);
    }, 3000);
}
</script>
