<!-- Validation Results Modal -->
<div id="validation-modal" class="modal-backdrop" style="display: none;">
    <div class="modal" style="max-width: 600px;">
        <div class="modal-header">
            <h2 style="font-size: var(--text-xl); font-weight: var(--font-semibold); color: var(--text-primary); margin: 0; display: flex; align-items: center; gap: var(--space-2);">
                <i data-lucide="shield-check" style="width: 1.4rem; height: 1.4rem; color: var(--accent-primary);"></i>
                Pre-Launch Validation
            </h2>
            <button class="btn-close" onclick="closeValidationModal()">&times;</button>
        </div>
        
        <div class="modal-body" id="validation-content">
            <!-- Loading state -->
            <div id="validation-loading" style="text-align: center; padding: var(--space-8);">
                <div class="spinner"></div>
                <p style="color: var(--text-secondary); margin-top: var(--space-4);">Running validation checks...</p>
            </div>
        </div>
    </div>
</div>

<style>
    .modal-backdrop {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.7);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: var(--z-modal);
        backdrop-filter: blur(4px);
    }
    
    .modal {
        background: var(--bg-secondary);
        border: 1px solid var(--border-primary);
        border-radius: var(--radius-xl);
        box-shadow: var(--shadow-2xl);
        width: 90%;
        max-height: 80vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        animation: modalSlideIn 0.2s ease;
    }
    
    @keyframes modalSlideIn {
        from {
            opacity: 0;
            transform: translateY(-20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    .modal-header {
        padding: var(--space-4) var(--space-6);
        border-bottom: 1px solid var(--border-primary);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    
    .modal-body {
        padding: var(--space-6);
        overflow-y: auto;
        flex: 1;
    }
    
    .btn-close {
        background: transparent;
        border: none;
        font-size: 1.5rem;
        color: var(--text-tertiary);
        cursor: pointer;
        padding: var(--space-2);
        border-radius: var(--radius-md);
        line-height: 1;
    }
    
    .btn-close:hover {
        background: var(--bg-hover);
        color: var(--text-primary);
    }
    
    .validation-summary {
        display: flex;
        gap: var(--space-4);
        margin-bottom: var(--space-6);
        padding: var(--space-4);
        background: var(--bg-tertiary);
        border-radius: var(--radius-md);
    }
    
    .validation-stat {
        text-align: center;
        flex: 1;
    }
    
    .validation-stat-value {
        font-size: var(--text-2xl);
        font-weight: var(--font-bold);
    }
    
    .validation-stat-label {
        font-size: var(--text-xs);
        color: var(--text-tertiary);
        text-transform: uppercase;
    }
    
    .validation-check {
        display: flex;
        align-items: flex-start;
        gap: var(--space-3);
        padding: var(--space-3);
        border-radius: var(--radius-md);
        margin-bottom: var(--space-2);
        background: var(--bg-tertiary);
    }
    
    .validation-check.passed {
        border-left: 3px solid var(--accent-success);
    }
    
    .validation-check.failed {
        border-left: 3px solid var(--accent-error);
    }
    
    .validation-issue {
        padding: var(--space-3);
        margin: var(--space-2) 0;
        border-radius: var(--radius-md);
        font-size: var(--text-sm);
    }
    
    .validation-issue.error {
        background: var(--danger-bg-subtle);
        border: 1px solid var(--danger-border);
    }
    
    .validation-issue.warning {
        background: var(--warning-bg);
        border: 1px solid var(--warning-border);
    }
    
    .validation-issue.info {
        background: var(--info-bg);
        border: 1px solid var(--info-border);
    }
    
    .validation-actions {
        display: flex;
        gap: var(--space-3);
        margin-top: var(--space-6);
        padding-top: var(--space-4);
        border-top: 1px solid var(--border-primary);
    }
</style>

<script>
    function showValidationModal() {
        document.getElementById('validation-modal').style.display = 'flex';
        runValidation();
    }
    
    function closeValidationModal() {
        document.getElementById('validation-modal').style.display = 'none';
    }
    
    async function runValidation() {
        const content = document.getElementById('validation-content');
        
        try {
            const response = await fetch('/api/launcher/validate');
            const data = await response.json();
            
            content.innerHTML = renderValidationResults(data);
            lucide.createIcons();
        } catch (error) {
            content.innerHTML = `
                <div style="text-align: center; padding: var(--space-8); color: var(--accent-error);">
                    <i data-lucide="alert-circle" style="width: 48px; height: 48px;"></i>
                    <p style="margin-top: var(--space-4);">Validation failed: ${error.message}</p>
                </div>
            `;
            lucide.createIcons();
        }
    }
    
    function renderValidationResults(data) {
        const statusIcon = data.success ? 'check-circle' : 'alert-triangle';
        const statusColor = data.success ? 'var(--accent-success)' : 'var(--accent-error)';
        
        let html = `
            <!-- Summary -->
            <div style="text-align: center; margin-bottom: var(--space-6);">
                <i data-lucide="${statusIcon}" style="width: 64px; height: 64px; color: ${statusColor};"></i>
                <h3 style="font-size: var(--text-lg); font-weight: var(--font-semibold); color: var(--text-primary); margin-top: var(--space-3);">
                    ${data.success ? 'All Checks Passed' : 'Issues Found'}
                </h3>
                <p style="color: var(--text-secondary); font-size: var(--text-sm);">
                    Completed in ${data.duration_ms.toFixed(0)}ms
                </p>
            </div>
            
            <!-- Stats -->
            <div class="validation-summary">
                <div class="validation-stat">
                    <div class="validation-stat-value" style="color: var(--accent-success);">${data.passed_checks}</div>
                    <div class="validation-stat-label">Passed</div>
                </div>
                <div class="validation-stat">
                    <div class="validation-stat-value" style="color: var(--accent-error);">${data.error_count}</div>
                    <div class="validation-stat-label">Errors</div>
                </div>
                <div class="validation-stat">
                    <div class="validation-stat-value" style="color: var(--accent-warning);">${data.warning_count}</div>
                    <div class="validation-stat-label">Warnings</div>
                </div>
            </div>
            
            <!-- Checks -->
            <div style="margin-bottom: var(--space-4);">
                <h4 style="font-size: var(--text-base); font-weight: var(--font-semibold); color: var(--text-primary); margin-bottom: var(--space-3);">
                    Validation Checks
                </h4>
        `;
        
        for (const check of data.checks) {
            const checkIcon = check.passed ? 'check-circle' : 'x-circle';
            const checkColor = check.passed ? 'var(--accent-success)' : 'var(--accent-error)';
            
            html += `
                <div class="validation-check ${check.passed ? 'passed' : 'failed'}">
                    <i data-lucide="${checkIcon}" style="width: 20px; height: 20px; color: ${checkColor}; flex-shrink: 0; margin-top: 2px;"></i>
                    <div style="flex: 1;">
                        <div style="font-weight: var(--font-medium); color: var(--text-primary);">${check.name}</div>
                        <div style="font-size: var(--text-sm); color: var(--text-secondary);">${check.message}</div>
            `;
            
            // Show issues for this check
            for (const issue of check.issues || []) {
                const issueClass = issue.severity;
                const issueIcon = issue.severity === 'error' ? 'x-circle' : issue.severity === 'warning' ? 'alert-triangle' : 'info';
                
                html += `
                    <div class="validation-issue ${issueClass}">
                        <div style="display: flex; align-items: flex-start; gap: var(--space-2);">
                            <i data-lucide="${issueIcon}" style="width: 16px; height: 16px; flex-shrink: 0; margin-top: 2px;"></i>
                            <div>
                                <div style="font-weight: var(--font-medium);">${issue.title}</div>
                                <div style="color: var(--text-secondary);">${issue.message}</div>
                                ${issue.file_path ? `<div style="font-size: var(--text-xs); color: var(--text-tertiary); margin-top: var(--space-1);">${issue.file_path}${issue.line_number ? ':' + issue.line_number : ''}</div>` : ''}
                                ${issue.suggestion ? `<div style="font-size: var(--text-xs); color: var(--accent-info); margin-top: var(--space-1);">💡 ${issue.suggestion}</div>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            }
            
            html += `
                    </div>
                </div>
            `;
        }
        
        html += `
            </div>
            
            <!-- Actions -->
            <div class="validation-actions">
                ${!data.can_launch ? `
                    <button class="btn btn-secondary" style="flex: 1;" onclick="runValidation()">
                        <i data-lucide="refresh-cw" style="width: 1rem; height: 1rem; margin-right: var(--space-2);"></i>
                        Re-run Checks
                    </button>
                ` : ''}
                ${data.can_launch ? `
                    <button class="btn btn-primary" style="flex: 1;" onclick="launchGame(); closeValidationModal();">
                        <i data-lucide="play" style="width: 1rem; height: 1rem; margin-right: var(--space-2);"></i>
                        Launch Game
                    </button>
                ` : `
                    <button class="btn btn-secondary" onclick="launchGame(); closeValidationModal();" title="Launch despite errors">
                        <i data-lucide="alert-triangle" style="width: 1rem; height: 1rem; margin-right: var(--space-2);"></i>
                        Launch Anyway
                    </button>
                `}
                <button class="btn btn-ghost" onclick="closeValidationModal()">
                    Cancel
                </button>
            </div>
        `;
        
        return html;
    }
    
    async function launchGame() {
        try {
            await fetch('/api/launcher/launch', { method: 'POST' });
        } catch (error) {
            console.error('Launch failed:', error);
        }
    }
    
    // Close modal on backdrop click
    document.getElementById('validation-modal')?.addEventListener('click', function(e) {
        if (e.target === this) {
            closeValidationModal();
        }
    });
</script>
