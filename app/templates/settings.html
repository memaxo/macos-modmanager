{% extends "base.html" %}

{% block content %}
<div style="margin-bottom: var(--space-6);">
    <h1 style="font-size: var(--text-3xl); font-weight: var(--font-bold); color: var(--text-primary); margin-bottom: var(--space-2);">
        Settings
    </h1>
    
    <div class="card" style="padding: var(--space-6);">
        <h2 style="font-size: var(--text-xl); font-weight: var(--font-semibold); color: var(--text-primary); margin-bottom: var(--space-4);">
            General
        </h2>
        <form>
            <div style="margin-bottom: var(--space-4);">
                <label style="display: flex; align-items: center; gap: var(--space-2); cursor: pointer;">
                    <input type="checkbox" checked style="width: 1.25rem; height: 1.25rem;">
                    <span style="color: var(--text-secondary);">Auto-check for updates</span>
                </label>
            </div>
            <div style="margin-bottom: var(--space-4);">
                <label style="display: flex; align-items: center; gap: var(--space-2); cursor: pointer;">
                    <input type="checkbox" checked style="width: 1.25rem; height: 1.25rem;">
                    <span style="color: var(--text-secondary);">Backup before install</span>
                </label>
            </div>
            <button type="submit" class="btn btn-primary">Save Settings</button>
        </form>
    </div>
</div>
{% endblock %}
